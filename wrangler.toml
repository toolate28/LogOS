name = "reson8-edge"
main = "src/index.ts"
compatibility_date = "2024-03-23"

[observability]
enabled = true

[[kv_namespaces]]
binding = "ATOM_KV"
id = "d4f4c3ec067946518fdc138414a42f5f"

[[d1_databases]]
binding = "ATOM_DB"
database_name = "atom_trail"
database_id = "79d496efbfab4d54a6277ed80dc29d1f"

# Artifact Storage (R2 ID: 164e8356339246bf8990ffc57b2dc7d2)
[[r2_buckets]]
binding = "RESON8_BUCKET"
bucket_name = "reson8-artifacts"

# Vector Search (Vectorize ID: a767863b2dee474eb212ad0a7d0e6e9f)
[[vectorize]]
binding = "VECTORIZE_INDEX"
index_name = "reson8-embeddings"

# Message Queue (Queue ID: be565618e09c44f2b084ab5039965715)
[[queues.producers]]
binding = "ATOM_QUEUE"
queue = "reson8-queue"

[vars]
ENVIRONMENT = "production"
# CLOUDFLARE_API_TOKEN is set via secrets
